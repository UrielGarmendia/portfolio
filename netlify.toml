[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.images]
  compress = true

[[headers]]
  for = "/*"
  [headers.values]
    # Previene clickjacking (reemplaza X-Frame-Options en browsers modernos)
    X-Frame-Options = "DENY"

    # Previene MIME sniffing — evita que el browser ejecute JS disfrazado de imagen
    X-Content-Type-Options = "nosniff"

    # Cross-Origin Opener Policy — aísla el contexto de navegación
    Cross-Origin-Opener-Policy = "same-origin"

    # Referrer Policy — no filtra la URL de origen a sitios externos
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions Policy — deshabilitar APIs sensibles no utilizadas(), microphone=(), geolocation=(), payment=()"

    Permissions-Policy = "camera=
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.emailjs.com; frame-src 'none'; object-src 'none'; base-uri 'self'; require-trusted-types-for 'script';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache del PDF del CV
[[headers]]
  for = "/*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Disposition = "attachment"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
